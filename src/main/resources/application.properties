spring.application.name=events
server.port=8087

# PostgreSQL — Neon (serverless externo), no RDS: SPRING_DATASOURCE_* ya son
# los nombres nativos que trae patricia-dev/events/postgres via ExternalSecret,
# no hace falta remapear nada.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/events_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# RabbitMQ — Amazon MQ exige el scheme amqps://, que solo `addresses` codifica
# bien (host/port sueltos no bastan). SPRING_RABBITMQ_ADDRESSES/USERNAME/
# PASSWORD son el binding nativo de Spring Boot y vienen directo del secret
# compartido patricia-dev/amazon-mq via el ExternalSecret (mismo fix que se
# aplico en Auth/Users/Matching).
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# AWS S3 (Event pictures) — presigned POST upload.
# PENDIENTE: S3PresignedPostAdapter firma SigV4 a mano y necesita
# AWS_ACCESS_KEY_ID/SECRET_ACCESS_KEY/SESSION_TOKEN como strings ya resueltos
# (igual que paso con Parches) — no es compatible con IRSA tal cual esta.
# Mientras no se resuelva (reescribir con el SDK de AWS + DefaultCredentialsProvider,
# o un IAM user de larga duracion en Secrets Manager), estas 3 quedan vacias:
# el codigo ya maneja la ausencia con InvalidPictureUploadException limpia en
# la request, no tumba el pod. La subida de fotos de evento NO funciona hasta
# que se resuelva esto.
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:patricia-events-pictures}
# Optional: S3-compatible endpoint for local dev (LocalStack/MinIO), e.g. http://localhost:4566
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
# Optional: CloudFront/custom domain serving the bucket; otherwise the S3 object URL is used
aws.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:}

# Event picture upload policy
event.picture.max-bytes=${EVENT_PICTURE_MAX_BYTES:5242880}
event.picture.upload-expiry-seconds=${EVENT_PICTURE_UPLOAD_EXPIRY_SECONDS:300}

# Actuator — health/info expuestos + probes separados para k8s (startup/readiness
# contra /actuator/health, liveness contra /actuator/health/liveness). No hay
# spring-security en este servicio, asi que no hay riesgo del bug de Auth
# (filtro bloqueando /actuator/health/liveness con 401).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
