spring.application.name=events
server.port=8087

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/events_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# AWS S3 (Event pictures) — presigned POST upload
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:patricia-events-pictures}
# Optional: S3-compatible endpoint for local dev (LocalStack/MinIO), e.g. http://localhost:4566
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
# Optional: CloudFront/custom domain serving the bucket; otherwise the S3 object URL is used
aws.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:}

# Event picture upload policy
event.picture.max-bytes=${EVENT_PICTURE_MAX_BYTES:5242880}
event.picture.upload-expiry-seconds=${EVENT_PICTURE_UPLOAD_EXPIRY_SECONDS:300}
