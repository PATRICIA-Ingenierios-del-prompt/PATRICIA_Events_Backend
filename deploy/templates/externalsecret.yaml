# Pulls everything Events needs from AWS Secrets Manager into a native K8s
# Secret (events-secrets) that the Deployment mounts via envFrom.
#
# amazon-mq es un blob JSON, cada campo con su propio `property`, mapeado a
# los nombres nativos de Spring (SPRING_RABBITMQ_*) -- application.properties
# ya se ajusto para usar `addresses` en vez de host/port sueltos (Amazon MQ
# exige el scheme amqps://).
#
# events/postgres es Neon (Postgres serverless externo, no RDS -- el free
# tier de RDS ya esta copado por users/parche-core/matching). Su forma en AWS
# SM ya es SPRING_DATASOURCE_URL/USERNAME/PASSWORD (la misma convencion nativa
# que usa module.secrets tanto para RDS como para Neon), y
# application.properties ya espera exactamente esos nombres -- no hace falta
# remapear nada, a diferencia de lo que paso con Matching/Users.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: events-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: events-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/events/postgres", property: SPRING_DATASOURCE_URL }
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/events/postgres", property: SPRING_DATASOURCE_USERNAME }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/events/postgres", property: SPRING_DATASOURCE_PASSWORD }
