apiVersion: apps/v1
kind: Deployment
metadata:
  name: events
  namespace: patricia-app
  labels: { app: events }
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels: { app: events }
  template:
    metadata:
      labels: { app: events, patricia.io/sg-tier: standard }
    spec:
      serviceAccountName: events
      containers:
        - name: events
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef: { name: events-config }
            - secretRef:    { name: events-secrets }

          startupProbe:
            httpGet: { path: /actuator/health, port: 8087 }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8087 }
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8087 }
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
